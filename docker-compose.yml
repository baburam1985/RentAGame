services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  unit-tests:
    build:
      context: ./web
      dockerfile: Dockerfile.unit-tests
    environment:
      - CI=true

  e2e-tests:
    build:
      context: ./web
      dockerfile: Dockerfile.e2e-tests
    depends_on:
      - app
    environment:
      - BASE_URL=http://app:3000
      - CI=true

services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  unit-tests:
    build:
      context: ./web
      dockerfile: Dockerfile.unit-tests
    environment:
      - CI=true

  e2e-tests:
    build:
      context: ./web
      dockerfile: Dockerfile.e2e-tests
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:3000
      - CI=true
